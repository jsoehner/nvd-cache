name: NVD Cache Update

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-nvd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Update NVD Database
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          # Use the latest major version (12.1.0) of dependency-check-maven directly
          if [ -z "$NVD_API_KEY" ]; then
            echo "NVD_API_KEY not found. Updating without key..."
            mvn org.owasp:dependency-check-maven:12.1.0:update-only
          else
            echo "Updating NVD database using API key..."
            mvn org.owasp:dependency-check-maven:12.1.0:update-only -DnvdApiKey=$NVD_API_KEY
          fi

      - name: Compress H2 Database
        run: |
          cd ~/.m2/repository/org/owasp/dependency-check-data
          zip odc.mv.db.zip odc.mv.db

      - name: Create or Update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the existing release and tag if it exists to replace it
          gh release delete latest-nvd-data -y --cleanup-tag || true
          
          # Create a new release and upload the compressed database
          gh release create latest-nvd-data ~/.m2/repository/org/owasp/dependency-check-data/odc.mv.db.zip \
            --title "NVD Database Cache" \
            --notes "Automated NVD database update for security scanning jobs." \
            --latest
